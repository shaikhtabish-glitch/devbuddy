# Week 0 Smoke Test — Does the model return valid structured output?
#
# Run: npx promptfoo@latest eval --config week-00-smoke.yaml
#
# Prerequisites:
#   export OPENROUTER_API_KEY=sk-or-your-key

description: "Week 0 — Structured output smoke test"

providers:
  - id: openrouter:openai/gpt-4o-mini
    config:
      temperature: 0

prompts:
  - |-
    You are a build status checker. Return a JSON object with these fields:
    - project: string (the project name)
    - status: "passing" | "failing" | "in_progress" | "unknown"
    - confidence: number between 0 and 1
    - explanation: string (one sentence)

    Check the build status of: {{project}}

    Return ONLY valid JSON. No other text.

tests:
  - vars:
      project: auth-service
    assert:
      - type: contains-json
      - type: javascript
        value: |
          const output = JSON.parse(output);
          return output.project === "auth-service";
      - type: javascript
        value: |
          const output = JSON.parse(output);
          return ["passing", "failing", "in_progress", "unknown"].includes(output.status);
      - type: javascript
        value: |
          const output = JSON.parse(output);
          return typeof output.confidence === "number" && output.confidence >= 0 && output.confidence <= 1;

  - vars:
      project: api-gateway
    assert:
      - type: contains-json
      - type: javascript
        value: |
          const output = JSON.parse(output);
          return output.project === "api-gateway";

  - vars:
      project: user-service
    assert:
      - type: contains-json
      - type: javascript
        value: |
          const output = JSON.parse(output);
          return output.project === "user-service";
